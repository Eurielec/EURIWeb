version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: asociacion_db
    environment:
      POSTGRES_USER: mi_usuario
      POSTGRES_PASSWORD: mi_password_secreto
      POSTGRES_DB: asociacion_web
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: